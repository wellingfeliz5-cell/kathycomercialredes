        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); color: var(--text-main); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .wrapper { width: 100%; max-width: 400px; text-align: center; }
        .profile-pic { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; margin-bottom: 20px; border: 2px solid var(--card-bg); padding: 4px; }

        .link-item:hover { background-color: var(--accent); color: #000; transform: translateY(-3px); }
        
        .switch-btn {
            display: inline-block;
            margin-top: 30px;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.85rem;
            padding: 8px 16px;
            border: 1px dashed var(--text-dim);
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        .switch-btn:hover {
            color: var(--text-main);
            border-color: var(--text-main);
            background: rgba(255,255,255,0.05);
        }

        footer { margin-top: 40px; font-size: 0.7rem; color: var(--text-dim); letter-spacing: 2px; text-transform: uppercase; }
    </style>
</head>
