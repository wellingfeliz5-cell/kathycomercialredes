<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kathy Comercial - La Caleta</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #e63946;
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 400px;
            padding: 40px 20px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin-bottom: 20px;
            border: 4px solid var(--primary-color);
            object-fit: cover;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 8px;
            color: #fff;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .link-item {
            background-color: #334155;
            color: #fff;
            padding: 16px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            display: block;
            border: 1px solid transparent;
            -webkit-tap-highlight-color: transparent;
        }

        .link-item:hover {
            background-color: #475569;
            transform: translateY(-2px);
            border-color: var(--primary-color);
        }

        /* Ajuste para móviles: eliminamos el transform:scale que causaba el fallo del click */
        .link-item:active {
            background-color: #1e293b;
        }

        .footer {
            margin-top: 40px;
            font-size: 12px;
            color: #64748b;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://i.ibb.co/6R0D6S2/logo-kathy.png" alt="Kathy Comercial" class="profile-img">
        <h1>Kathy Comercial</h1>
        <p class="subtitle">La Caleta, Boca Chica</p>
        
        <div class="links">
            <a href="tel:18095498781" class="link-item">Tel: (809) 549-8781</a>
            <a href="https://wa.me/18097081759" class="link-item" target="_blank" rel="noopener">WhatsApp</a>
            <a href="https://www.instagram.com/kathycomercial/" class="link-item" target="_blank" rel="noopener">Instagram</a>
            <a href="https://www.tiktok.com/@kathycomercial" class="link-item" target="_blank" rel="noopener">TikTok</a>
            <a href="https://maps.app.goo.gl/a2TmJbXgCGJsWLXx8" class="link-item" target="_blank" rel="noopener">📍 Dirección</a>
        </div>

        <div class="footer">
            © 2024 Kathy Comercial. Todos los derechos reservados.
        </div>
    </div>
</body>
</html>
