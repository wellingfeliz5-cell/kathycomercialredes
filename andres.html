<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andrés | Enlaces</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0b0b; --card-bg: #1a1a1a; --text-main: #ffffff; --text-dim: #a0a0a0; --accent: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); color: var(--text-main); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .wrapper { width: 100%; max-width: 400px; text-align: center; }
        .profile-pic { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; margin-bottom: 20px; border: 2px solid var(--card-bg); padding: 4px; }
        .title { font-size: 1.5rem; font-weight: 600; margin-bottom: 4px; }
        .location { font-size: 0.85rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; display: block; }
        .description { font-size: 0.95rem; color: var(--text-dim); margin-bottom: 35px; line-height: 1.5; }
        .links { display: flex; flex-direction: column; gap: 14px; }
        .link-item { display: block; padding: 16px; text-decoration: none; color: var(--text-main); background-color: var(--card-bg); border-radius: 12px; font-weight: 500; transition: all 0.25s ease; border: 1px solid rgba(255, 255, 255, 0.05); -webkit-tap-highlight-color: transparent; }
        
        @media (hover: hover) {
            .link-item:hover { background-color: var(--accent); color: #000; transform: translateY(-3px); }
        }
        .link-item:active { transform: scale(0.98); background-color: rgba(255,255,255,0.1); }

        footer { margin-top: 50px; font-size: 0.7rem; color: var(--text-dim); letter-spacing: 2px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="wrapper">
        <img src="logo.png" alt="Logo" class="profile-pic">
        <h1 class="title">Kathy Comercial</h1>
        <span class="location">Sucursal Andrés</span>
        <p class="description">Tienda de Muebles y Electrodomesticos.</p>
        <div class="links">
            <a href="tel:18095235412" class="link-item">Tel: (809) 523-5412</a>
            <a href="https://wa.me/18093261522" class="link-item" target="_blank">WhatsApp</a>
            <a href="https://www.instagram.com/kathycomercial/" class="link-item" target="_blank">Instagram</a>
            <a href="https://www.tiktok.com/@kathycomercial?_r=1&_t=ZS-961nDEfqyoM" target="_blank" class="link-item">TikTok</a>
            <a href="https://maps.app.goo.gl/ExnpkzwbtetdJz3k7" class="link-item" target="_blank">📍 Dirección</a>
        </div>
        <footer>© 2026 Todos los derechos reservados.</footer>
    </div>
</body>
</html>
